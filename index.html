<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do-list</title>
    <style>
        body{
            display: flex; justify-content:center; margin-top: 20vh; background-color: #555454;
        }

        .abc{
            width: 600px; background-color: rgb(234, 253, 247); border: 1px solid;
            -webkit-box-shadow:0px 0px 104px 69px rgba(45,255,196,0.72);
            -moz-box-shadow: 0px 0px 104px 69px rgba(45,255,196,0.72);
            box-shadow: 0px 0px 104px 69px rgba(45,255,196,0.72);
            border-radius: 3% 3%;
        }
        .my-div{
            margin: 20px 0 20px 0; display: flex; justify-content: space-between; padding: 0px 10px 0px 10px;
        }

    </style>
</head>
<body>

    <!-- to do list -->
     <div class="abc">
        <div class="my-div">
            <input type="text" class="my-input" placeholder="Apna task Enter kare:-">
            <button class="my-btn">ADD</button>
        </div>  

     </div>

<script src="to-do-list.js"></script>
</body>
</html>
